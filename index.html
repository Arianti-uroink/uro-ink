<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URO-INK Reader</title>
  <style>
    :root {
      --primary: #0ea5b7;
      --primary-dark: #087f8f;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --gray: #6b7280;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #172937;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 28px;
    }

    h1 { margin-bottom: 6px; letter-spacing: 2px; font-size: 32px; }
    h2 { margin-top: 0; font-size: 26px; }
    p { line-height: 1.6; }

    .subtitle { font-weight: bold; font-size: 18px; margin-bottom: 16px; }
    .intro { max-width: 1100px; color: #374151; margin-bottom: 32px; }

    .layout {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      position: relative;
    }

    /* ROI strip */
    .roi {
      position: absolute;
      border: 3px dashed red;
      background-color: rgba(255, 0, 0, 0.05);
      cursor: move;
      touch-action: none;
    }

    .roi .resize-handle {
      position: absolute;
      right: -9px;
      bottom: -9px;
      width: 20px;
      height: 20px;
      background: white;
      border: 3px solid currentColor;
      border-radius: 50%;
      cursor: nwse-resize;
      touch-action: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .roi.telang .resize-handle { color: #22c55e; }
    .roi.kunyit .resize-handle { color: #f59e0b; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 16px;
    }
    table, th, td {
      border: 1px solid #444;
    }
    th, td { padding: 8px; text-align: center; }
    th { background-color: #ddd; }
  </style>
</head>
<body>

  <h1>URO-INK Reader</h1>
  <div class="layout">
    <div class="card" id="previewBox">
      <div id="roiTelang" class="roi telang" data-label="Area Bunga Telang">
        <div class="resize-handle"></div>
      </div>
      <div id="roiKunyit" class="roi kunyit" data-label="Area Kunyit">
        <div class="resize-handle"></div>
      </div>
      <p>Gambar Uji Warna Telang & Kunyit</p>
    </div>

    <div class="card">
      <h2>Data Telang Berdasarkan Jurnal</h2>
      <div id="telangTable"></div>
    </div>
  </div>

  <script>
    const previewBox = document.getElementById("previewBox");
    const roiTelang = document.getElementById("roiTelang");
    const roiKunyit = document.getElementById("roiKunyit");

    let roiState = {
      telang: { x: 0.1, y: 0.1, w: 0.3, h: 0.2 },
      kunyit: { x: 0.5, y: 0.5, w: 0.3, h: 0.2 }
    };

    function clamp(value, min, max) { return Math.min(Math.max(value, min), max); }

    function applyROIPosition() {
      Object.keys(roiState).forEach(key => {
        const el = key === "telang" ? roiTelang : roiKunyit;
        const state = roiState[key];
        el.style.left = state.x * 100 + "%";
        el.style.top = state.y * 100 + "%";
        el.style.width = state.w * 100 + "%";
        el.style.height = state.h * 100 + "%";
      });
    }
    applyROIPosition();

    function makeInteractiveROI(el, key) {
      let mode = null, startX = 0, startY = 0, startState = null;
      const handle = el.querySelector(".resize-handle");

      el.addEventListener("pointerdown", e => {
        if (e.target === handle) return;
        mode = "drag"; startX = e.clientX; startY = e.clientY;
        startState = { ...roiState[key] }; el.setPointerCapture(e.pointerId);
      });

      handle.addEventListener("pointerdown", e => {
        e.stopPropagation();
        mode = "resize"; startX = e.clientX; startY = e.clientY;
        startState = { ...roiState[key] }; handle.setPointerCapture(e.pointerId);
      });

      function handlePointerMove(e) {
        if (!mode) return;
        const rect = previewBox.getBoundingClientRect();
        const dx = (e.clientX - startX) / rect.width;
        const dy = (e.clientY - startY) / rect.height;

        if (mode === "drag") {
          roiState[key].x = clamp(startState.x + dx, 0, 1 - roiState[key].w);
          roiState[key].y = clamp(startState.y + dy, 0, 1 - roiState[key].h);
        }
        if (mode === "resize") {
          const minW = 0.10, minH = 0.05;
          roiState[key].w = clamp(startState.w + dx, minW, 1 - roiState[key].x);
          roiState[key].h = clamp(startState.h + dy, minH, 1 - roiState[key].y);
        }
        applyROIPosition();
      }

      function stopPointerAction() { mode = null; }

      el.addEventListener("pointermove", handlePointerMove);
      handle.addEventListener("pointermove", handlePointerMove);
      el.addEventListener("pointerup", stopPointerAction);
      handle.addEventListener("pointerup", stopPointerAction);
      el.addEventListener("pointercancel", stopPointerAction);
      handle.addEventListener("pointercancel", stopPointerAction);
    }

    makeInteractiveROI(roiTelang, "telang");
    makeInteractiveROI(roiKunyit, "kunyit");

    const TELANG_REFERENCES = [
      { ph:1, sample:"HCl 0,1 M", wavelength:542, absorbance:0.4603, absorbedColor:"Green", complementaryColor:"Purple"},
      { ph:2, sample:"HCl 0,01 M", wavelength:550, absorbance:0.41059, absorbedColor:"Green", complementaryColor:"Purple"},
      { ph:3, sample:"HCl 0,001 M", wavelength:572, absorbance:0.38021, absorbedColor:"Yellow-Green", complementaryColor:"Violet"},
      { ph:4, sample:"HCl 0,0001 M", wavelength:572, absorbance:0.41137, absorbedColor:"Yellow-Green", complementaryColor:"Violet"},
      { ph:5, sample:"HCl 0,00001 M", wavelength:572, absorbance:0.50805, absorbedColor:"Yellow-Green", complementaryColor:"Violet"},
      { ph:6, sample:"HCl 0,000001 M", wavelength:616, absorbance:0.5342, absorbedColor:"Red", complementaryColor:"Blue-Green"},
      { ph:7, sample:"H2O", wavelength:620, absorbance:0.5762, absorbedColor:"Red", complementaryColor:"Blue-Green"},
      { ph:8, sample:"NaOH 0,000001 M", wavelength:620, absorbance:0.62785, absorbedColor:"Red", complementaryColor:"Blue-Green"},
      { ph:9, sample:"NaOH 0,00001 M", wavelength:626, absorbance:0.64036, absorbedColor:"Red", complementaryColor:"Blue-Green"},
      { ph:10, sample:"NaOH 0,0001 M", wavelength:626, absorbance:0.55047, absorbedColor:"Red", complementaryColor:"Blue-Green"},
      { ph:11, sample:"NaOH 0,001 M", wavelength:400, absorbance:0.67913, absorbedColor:"Violet", complementaryColor:"Yellow-Green"},
      { ph:12, sample:"NaOH 0,01 M", wavelength:400, absorbance:0.81275, absorbedColor:"Violet", complementaryColor:"Yellow-Green"},
      { ph:13, sample:"NaOH 0,1 M", wavelength:400, absorbance:0.68581, absorbedColor:"Violet", complementaryColor:"Yellow-Green"},
      { ph:14, sample:"NaOH 1 M", wavelength:400, absorbance:0.73081, absorbedColor:"Violet", complementaryColor:"Yellow-Green"}
    ];

    const tableDiv = document.getElementById("telangTable");
    tableDiv.innerHTML = `<table>
      <thead>
        <tr>
          <th>pH</th><th>Sampel</th><th>λ Maks</th><th>Absorbansi</th><th>Absorbed Color</th><th>Complementary Color</th>
        </tr>
      </thead>
      <tbody>
        ${TELANG_REFERENCES.map(item => `
          <tr>
            <td>${item.ph}</td>
            <td>${item.sample}</td>
            <td>${item.wavelength}</td>
            <td>${item.absorbance}</td>
            <td>${item.absorbedColor}</td>
            <td>${item.complementaryColor}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;
  </script>

</body>
</html>
